<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>shopping-cart</title>
</head>

<body class="h-screen font-sans bg-gray-300">

    <!-- Manu Bar -->
    <div class="bg-gray-200 flex items-center justify-between h-16 px-37 shadow-lg">
        <div class="flex items-center gap-2 text-3xl">
            <i class="fa-solid fa-cow text-green-500 text-4xl"></i>
            <p class="font-semibold">
                <span class="font-bold">Job</span>Passcard
            </p>
        </div>
        <div class="flex items-center font-bold text-xl gap-8">
            <button
                class="transition delay-50 duration-150 ease-in-out hover:translate-y-1 hover:scale-110 hover:bg-gray-400 rounded-3xl px-4 py-2">ABOUT
                US</button>
            <button
                class="transition delay-50 duration-150 ease-in-out hover:translate-y-1 hover:scale-110 hover:bg-gray-400 rounded-3xl px-4 py-2">PASSCARD</button>
            <button
                class="transition delay-50 duration-150 ease-in-out hover:translate-y-1 hover:scale-110 hover:bg-gray-400 rounded-3xl px-4 py-2">PROFILE</button>
        </div>
        <div class=" flex items-center font-bold text-xl gap-8">
            <button class="text-gray-500"><i class="fa-solid fa-magnifying-glass"></i></button>
            <div class="relative">
                <div class="absolute bg-red-500 size-4 rounded-full left-4.5 bottom-4.5 text-xs font-light text-white text-center">1</div>
                <div class="absolute bg-red-500 size-4 animate-ping rounded-full left-4.5 bottom-4.5"></div>
                <button class="text-gray-500"><i class="fa-solid fa-cart-shopping"></i></button>
            </div>
            <button
                class="transition delay-50 duration-150 ease-in-out hover:translate-y-1 hover:scale-110 hover:bg-gray-400 rounded-3xl px-4 py-2">LOGIN</button>
            <button
                class="transition delay-50 duration-150 ease-in-out hover:translate-y-1 hover:scale-110 hover:bg-gray-400 rounded-3xl px-4 py-2">SING
                UP</button>
        </div>
    </div>

    <!-- titel -->
    <h1 class="text-4xl font-bold ml-37 mt-15">My Card</h1>

    <!-- box card -->
    <div class=" flex justify-center mx-37 mt-10 min-w-max h-[70vh]">
        <div class="min-w-[620px] shrink-0 w-1/2 overflow-y-auto">
            <!-- card1 -->
            <div class="bg-gray-200 flex items-center mr-2 mb-3 rounded-3xl h-fit p-7 ">
                <button
                    class="bg-gray-200 text-green-500 text-2xl outline-2 rounded-full p-2 w-12 h-12 ml-3 transition delay-50 duration-150 ease-in-out hover:scale-120">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
                <div class="flex flex-col items-start bg-blue-500 rounded-3xl h-52 w-52 p-5 pt-8 ml-7">
                    <button class="bg-white text-blue-500 text-3xl rounded-lg p-1">
                        <i class="fa-regular fa-file-lines"></i>
                    </button>
                    <p class="text-xl font-bold text-white mt-2">Google Docs</p>
                    <p class="text-lg font-thin text-white">Used for business</p>
                </div>
                <div class="flex flex-col justify-between ml-6 h-36">
                    <div>
                        <h3 class="text-3xl font-semibold mb-1">Google Docs</h3>
                            <i class="fa-solid fa-circle text-green-500 text-xl"></i>
                            <i class="fa-solid fa-circle text-gray-300 text-xl"></i>
                            <i class="fa-solid fa-circle text-gray-300 text-xl"></i>
                        <select name="" id="" class="text-xl ml-5">
                            <option value="">LV 1-3</option>
                            <option value="">LV 2-3</option>
                            <option value="">LV 3-3</option>
                        </select>
                    </div>
                    <P class="text-xl mb-3">THB 150</P>
                </div>
            </div>

            <!-- card2 -->
            <div class="bg-gray-200 flex items-center mr-2 mb-3 rounded-3xl h-fit p-7 ">
                <button
                    class="bg-gray-200 text-green-500 text-2xl outline-2 rounded-full p-2 w-12 h-12 ml-3 transition delay-50 duration-150 ease-in-out hover:scale-120">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
                <div class="flex flex-col items-start bg-orange-500 rounded-3xl h-52 w-52 p-5 pt-8 ml-7">
                    <button class="bg-white text-orange-500 text-3xl rounded-lg p-1">
                        <i  class="fa-regular fa-file-pdf"></i>
                    </button>
                    <p class="text-xl font-bold text-white mt-2">Google Slides</p>
                    <p class="text-lg font-thin text-white">Used for business</p>
                </div>
                <div class="flex flex-col justify-between ml-6 h-36">
                    <div>
                        <h3 class="text-3xl font-semibold mb-1">Google Slides</h3>
                        <i class="fa-solid fa-circle text-green-500 text-xl"></i>
                        <i class="fa-solid fa-circle text-green-500 text-xl"></i>
                        <i class="fa-solid fa-circle text-green-500 text-xl"></i>
                        <i class="fa-solid fa-circle text-gray-300 text-xl"></i>
                        <select name="" id="" class="text-xl ml-5">
                            <option value="">LV 1-4</option>
                            <option value="">LV 2-4</option>
                            <option value="">LV 3-4</option>
                            <option value="">LV 4-4</option>
                        </select>
                    </div>
                    <P class="text-xl mb-3">THB 150</P>
                </div>
            </div>

            <!-- card3 -->
            <div class="bg-gray-200 flex items-center mr-2 mb-3 rounded-3xl h-fit p-7 ">
                <button
                    class="bg-gray-200 text-green-500 text-2xl outline-2 rounded-full p-2 w-12 h-12 ml-3 transition delay-50 duration-150 ease-in-out hover:scale-120">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
                <div class="flex flex-col items-start bg-yellow-500 rounded-3xl h-52 w-52 p-5 pt-8 ml-7">
                    <button class="bg-white text-yellow-500 text-3xl rounded-lg p-1">
                        <i class="fa-solid fa-video"></i>
                    </button>
                    <p class="text-xl font-bold text-white mt-2">Google Meet</p>
                    <p class="text-lg font-thin text-white">Used for business</p>
                </div>
                <div class="flex flex-col justify-between ml-6 h-36">
                    <div>
                        <h3 class="text-3xl font-semibold mb-1">Google Meet</h3>
                        <i class="fa-solid fa-circle text-green-500 text-xl"></i>
                        <i class="fa-solid fa-circle text-green-500 text-xl"></i>
                        <select name="" id="" class="text-xl ml-5">
                            <option value="">LV 1-3</option>
                            <option value="">LV 2-3</option>
                        </select>
                    </div>
                    <P class="text-xl mb-3">THB 150</P>
                </div>
            </div>

        </div>

        <!-- Oder Info -->
        <div class="bg-gray-300 rounded-3xl border-1 border-gray-400 ml-4 h-fit w-1/2 p-7 px-10">

            <p class="text-3xl font-bold mb-6">Order Info</p>
            <div class="flex justify-between items-center text-xl mb-6">
                <p class="text-gray-600">Subtotal</p>
                <p>THB 450</p>
            </div>
            <div class="flex items-center mb-6">
                <i class="fa-solid fa-ticket text-green-500 text-3xl"></i>
                <input type="text" placeholder="Promotion code"
                    class="text-lg border-1 border-gray-400 rounded-sm py-2 pl-3 ml-3 w-full">
                <button class="font-semibold text-xl text-green-500 rounded-2xl border-2 py-2 w-50 ml-3 transition delay-50 duration-150 ease-in-out 
                    hover:scale-110 
                    hover:bg-green-500 
                    hover:text-white 
                    hover:border-green-500">
                    APPLY
                </button>
            </div>
            <div class="flex justify-between items-center border-gray-400 border-t-1 pt-7 mb-7">
                <p class="text-lg font-semibold">Total payment</p>
                <p class="text-green-500 text-4xl font-bold ">THB 450</p>
            </div>

            <button class="bg-green-500 font-bold text-lg rounded-2xl py-2 w-full shadow-lg shadow-green-600 transition delay-50 duration-150 ease-in-out hover:scale-110 hover:bg-green-600">LOG IN TO CHECKOUT</button>

        </div>
    </div>
</body>

</html>
